version: "3.9"

services:
  # ═══════════════════════════════════════════════════════════════
  # L9 SEO BOT - The autonomous SEO engine
  # ═══════════════════════════════════════════════════════════════
  seo-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: l9-seo-bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3100:3100"  # API/Dashboard
    volumes:
      - ./data/reports:/app/data/reports
      - ./data/assets:/app/data/assets
      - ./logs:/app/logs
    networks:
      - l9-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════
  # POSTGRESQL - Shared database for Bot state + PostHog
  # ═══════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: l9-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-l9admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-l9_seo_bot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - l9-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-l9admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # REDIS - Job queue (BullMQ) + caching
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: l9-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - l9-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # CLICKHOUSE - PostHog event storage (high-performance analytics)
  # ═══════════════════════════════════════════════════════════════
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: l9-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: posthog
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-posthog}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - l9-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ═══════════════════════════════════════════════════════════════
  # POSTHOG - Behavior analytics (self-hosted)
  # ═══════════════════════════════════════════════════════════════
  posthog:
    image: posthog/posthog:latest
    container_name: l9-posthog
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-l9admin}:${POSTGRES_PASSWORD}@postgres:5432/posthog
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-posthog}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      SECRET_KEY: ${POSTHOG_SECRET_KEY}
      SITE_URL: ${POSTHOG_SITE_URL:-http://localhost:8000}
      IS_BEHIND_PROXY: "true"
      DISABLE_SECURE_SSL_REDIRECT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - l9-network

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:

networks:
  l9-network:
    driver: bridge

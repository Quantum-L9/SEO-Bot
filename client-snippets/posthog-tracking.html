<!-- Web Vitals Reporting to PostHog -->
<script type="module">
  import { onLCP, onINP, onCLS, onFCP, onTTFB } from 'https://unpkg.com/web-vitals@4/dist/web-vitals.attribution.js?module';

  function sendToPostHog(metric) {
    posthog.capture('web_vitals', {
      metric_name: metric.name,
      [metric.name.toLowerCase()]: metric.value,
      rating: metric.rating,
      delta: metric.delta,
      navigation_type: metric.navigationType,
    });
  }

  onLCP(sendToPostHog);
  onINP(sendToPostHog);
  onCLS(sendToPostHog);
  onFCP(sendToPostHog);
  onTTFB(sendToPostHog);
</script>

<!-- Scroll Depth Tracking -->
<script>
  (function() {
    let maxScroll = 0;
    let ticking = false;

    window.addEventListener('scroll', function() {
      if (!ticking) {
        window.requestAnimationFrame(function() {
          const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
          const scrollPercent = scrollHeight > 0 ? (window.scrollY / scrollHeight) : 0;
          maxScroll = Math.max(maxScroll, scrollPercent);
          ticking = false;
        });
        ticking = true;
      }
    });

    // Send scroll depth on page leave
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'hidden') {
        posthog.capture('scroll_depth', {
          scroll_depth: Math.round(maxScroll * 100),
          page_path: window.location.pathname,
        });
      }
    });
  })();
</script>
